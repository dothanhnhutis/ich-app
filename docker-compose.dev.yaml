services:
  postgres:
    container_name: postgres_container
    build: .
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=pgdb
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - 5432:5432
    command: >
      postgres
      -c shared_preload_libraries=pg_partman_bgw
      -c pg_partman_bgw.dbname=pgdb
      -c pg_partman_bgw.interval=10
      -c pg_partman_bgw.role=admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
      # Mount file CSV vào một thư mục tạm trong container để Postgres có thể đọc
      - ./data:/tmp
    networks:
      - mynet

  redis:
    container_name: redis_container
    image: redis:7-alpine
    restart: always
    # appendonly: bật AOF để dữ liệu cache phiên không mất khi restart
    command: redis-server --appendonly yes
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mynet

networks:
  mynet:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
